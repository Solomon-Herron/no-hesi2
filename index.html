<style>
  :root {
    --ink: #0D0D11;
    --panel: #17171D;
    --panel2: #1F1F27;
    --line: rgba(255,255,255,0.10);
    --orange: #FF6B35;
    --orange-dim: rgba(255,107,53,0.16);
    --wood: #C28F59;
    --text: #F4F2EE;
    --dim: #9A98A0;
    --green: #3ED66E;
    --insta: #E1306C;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--ink); }
  body {
    color: var(--text);
    font-family: 'Avenir Next', 'Helvetica Neue', system-ui, sans-serif;
    max-width: 480px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    padding-bottom: 110px;
  }
  button { font-family: inherit; cursor: pointer; }

  /* Header */
  header { padding: calc(env(safe-area-inset-top, 0px) + 18px) 18px 10px; display: flex; align-items: center; gap: 12px; }
  .title { font-size: 20px; font-weight: 800; letter-spacing: .5px; }
  .subtitle { font-size: 11px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 4px 18px; }
  .divider .l { flex: 1; height: 1px; background: var(--line); }
  .divider .c { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--line); position: relative; }
  .divider .c::after { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: var(--line); }

  main { padding: 10px 18px 0; }

  /* Cards */
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .card .info { flex: 1; min-width: 0; }
  .card .name { font-weight: 700; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .meta { font-size: 12px; color: var(--dim); margin-top: 3px; display: flex; gap: 10px; }
  .card .meta .yt { color: var(--wood); }
  .card .meta .ig { color: var(--insta); }

  .btn {
    border: none; border-radius: 10px; padding: 9px 14px;
    font-weight: 800; font-size: 13px; letter-spacing: .5px;
    background: var(--panel2); color: var(--text);
  }
  .btn.primary { background: var(--orange); color: #111; }
  .btn.green { background: var(--green); color: #111; }
  .btn.dim { color: var(--dim); }

  .playlink {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--orange-dim); color: var(--orange);
    border: 1px solid rgba(255,107,53,.35); text-decoration: none;
  }
  .playlink.insta {
    background: rgba(225,48,108,.14); color: var(--insta);
    border-color: rgba(225,48,108,.4);
  }

  /* Backup row */
  .backup { display: flex; gap: 10px; margin: 18px 0 8px; }
  .backup .btn { flex: 1; padding: 12px; }
  .backup-note { font-size: 11px; color: var(--dim); text-align: center; margin-bottom: 8px; line-height: 1.5; }

  /* Backup instructions */
  details.help {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 0; margin: 4px 0 24px; overflow: hidden;
  }
  details.help summary {
    list-style: none; cursor: pointer; padding: 13px 16px;
    font-size: 13px; font-weight: 800; letter-spacing: .5px; color: var(--wood);
    display: flex; align-items: center; gap: 8px;
  }
  details.help summary::-webkit-details-marker { display: none; }
  details.help summary::after { content: '＋'; margin-left: auto; color: var(--dim); font-weight: 400; }
  details.help[open] summary::after { content: '−'; }
  .help-body { padding: 0 16px 14px; font-size: 13px; color: var(--dim); line-height: 1.65; }
  .help-body b { color: var(--text); font-weight: 700; }
  .help-body ol { margin: 6px 0 10px; padding-left: 20px; }
  .help-body li { margin-bottom: 6px; }
  .help-body .warn { color: var(--orange); font-weight: 600; }

  /* Empty state */
  .empty { text-align: center; padding-top: 70px; }
  .empty .ball { font-size: 52px; }
  .empty .t { font-weight: 800; font-size: 18px; margin-top: 10px; }
  .empty .m { color: var(--dim); font-size: 14px; margin: 6px 30px 0; line-height: 1.5; }

  /* Bottom nav */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
    background: rgba(13,13,17,.96); border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px calc(env(safe-area-inset-bottom, 0px) + 12px);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 30;
  }
  .tab {
    flex: 1; background: transparent; border: none; color: var(--dim);
    font-weight: 700; font-size: 10.5px; letter-spacing: .6px;
    display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 0; min-width: 0;
  }
  .tab.active { color: var(--orange); }
  .tab .icon { font-size: 17px; }

  /* Notes */
  .note-snippet {
    font-size: 12px; color: var(--dim); margin-top: 4px; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    white-space: normal;
  }
  .field textarea {
    width: 100%; background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px;
    font-size: 16px; outline: none; font-family: inherit; line-height: 1.55;
    min-height: 180px; resize: vertical;
  }

  /* Note editor fills nearly the whole screen */
  #noteOverlay .sheet {
    height: calc(100dvh - 20px); max-height: none;
    display: flex; flex-direction: column;
  }
  #noteOverlay .field.grow {
    flex: 1; display: flex; flex-direction: column; min-height: 0;
  }
  #noteOverlay .field.grow textarea {
    flex: 1; min-height: 0; resize: none;
  }
  #noteOverlay .actions { flex-shrink: 0; margin-top: 10px; }
  .fab {
    width: 56px; height: 56px; border-radius: 50%; border: none; flex-shrink: 0;
    background: var(--orange); color: #111; font-size: 30px; font-weight: 700; line-height: 0;
    box-shadow: 0 4px 16px rgba(255,107,53,.45);
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--line);
    padding: 10px 18px; border-radius: 24px; font-size: 13px; font-weight: 600;
    box-shadow: 0 6px 20px rgba(0,0,0,.5); z-index: 40; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  #toast.show { opacity: 1; }

  /* Overlay sheets */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 50;
    display: none; align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    width: 100%; max-width: 480px; background: var(--ink);
    border: 1px solid var(--line); border-bottom: none; border-radius: 22px 22px 0 0;
    padding: 22px 20px calc(env(safe-area-inset-bottom, 0px) + 28px);
    max-height: 92vh; overflow-y: auto;
  }
  .sheet h2 { font-size: 18px; font-weight: 800; letter-spacing: .5px; margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .field input[type=text], .field input[type=url] {
    width: 100%; background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px; font-size: 16px; outline: none;
  }
  .field .hint { font-size: 12px; color: var(--dim); margin-top: 6px; line-height: 1.4; }
  .steppers { display: flex; gap: 10px; }
  .stepper {
    flex: 1; background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    display: flex; align-items: center; justify-content: space-between; padding: 6px 8px;
  }
  .stepper button {
    width: 38px; height: 38px; border-radius: 10px; border: none;
    background: rgba(255,255,255,.06); color: var(--text); font-size: 20px; font-weight: 700;
  }
  .stepper .val { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; text-align: center; }
  .stepper .lbl { font-size: 10px; color: var(--dim); letter-spacing: 1px; text-align: center; }
  .checkrow { display: flex; align-items: center; gap: 10px; font-size: 14px; margin: 14px 0 20px; }
  .checkrow input { width: 18px; height: 18px; accent-color: var(--orange); }
  .sheet .actions { display: flex; gap: 10px; }
  .sheet .actions .btn { padding: 14px; }
  .sheet .actions .cancel { flex: 1; }
  .sheet .actions .ok { flex: 2; }
  .btn:disabled { opacity: .4; }

  /* Timer screen */
  #timerScreen {
    position: fixed; inset: 0; background: var(--ink); z-index: 60;
    display: none; flex-direction: column; align-items: center;
    max-width: 480px; margin: 0 auto;
    padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px calc(env(safe-area-inset-bottom, 0px) + 26px);
    overflow-y: auto;
  }
  #timerScreen.open { display: flex; }
  .timer-top { width: 100%; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .timer-name { margin-top: 14px; font-size: 20px; font-weight: 800; text-align: center; padding: 0 10px; }
  .timer-state { font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

  /* YouTube embed */
  #videoWrap {
    display: none; width: 100%; margin-top: 14px;
    border-radius: 14px; overflow: hidden; border: 1px solid var(--line);
    aspect-ratio: 16 / 9; background: #000; flex-shrink: 0;
  }
  #videoWrap iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* Instagram button on timer screen */
  #instaBtn {
    display: none; margin-top: 14px; text-decoration: none;
    background: rgba(225,48,108,.14); color: var(--insta);
    border: 1px solid rgba(225,48,108,.4); border-radius: 12px;
    padding: 12px 18px; font-weight: 800; font-size: 14px; letter-spacing: .5px;
    align-items: center; gap: 8px; flex-shrink: 0;
  }

  .ring-wrap { position: relative; margin-top: 18px; flex-shrink: 0; }
  .ring-wrap svg { display: block; }
  .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  #ballEmoji { font-size: 28px; }
  #clock {
    font-size: 54px; font-weight: 900; font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', Menlo, monospace;
  }
  #timerScreen.compact #ballEmoji { font-size: 18px; }
  #timerScreen.compact #clock { font-size: 36px; }
  #clock.running { text-shadow: 0 0 24px rgba(255,107,53,.5); }
  #clock.done { color: var(--green); text-shadow: 0 0 24px var(--green); }
  #buzzerLabel { color: var(--green); font-weight: 800; letter-spacing: 3px; font-size: 12px; display: none; }
  .controls { display: flex; gap: 16px; margin: 20px 0 8px; align-items: center; flex-shrink: 0; }
  .ctl {
    width: 60px; height: 60px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--panel); color: var(--text); font-size: 22px;
  }
  .ctl.spacer { visibility: hidden; }
  #playPause {
    width: 86px; height: 86px; border-radius: 50%; border: none;
    background: var(--orange); color: #111; font-size: 28px; font-weight: 900;
    box-shadow: 0 6px 24px rgba(255,107,53,.45);
  }
  #playPause:disabled { background: var(--panel2); box-shadow: none; }
  .ctl.arrow { font-size: 24px; font-weight: 800; }
  .ctl.arrow:disabled { opacity: .3; }
  #runnerInfo {
    display: none; margin-top: 8px; font-size: 12px; font-weight: 800;
    letter-spacing: 2px; color: var(--wood); text-transform: uppercase;
  }

  /* Playlist builder */
  .pl-list { display: flex; flex-direction: column; gap: 8px; }
  .pl-row {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    padding: 11px 12px; display: flex; align-items: center; gap: 10px; font-size: 14px;
  }
  .pl-row .num { color: var(--orange); font-weight: 800; width: 20px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .pl-row .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .pl-row .dur { color: var(--dim); font-size: 12px; flex-shrink: 0; }
  .pl-row button {
    border: none; background: rgba(255,255,255,.06); color: var(--dim);
    width: 32px; height: 32px; border-radius: 8px; font-size: 15px; flex-shrink: 0;
  }
  .pl-row.pick { cursor: pointer; }
  .pl-row.pick .add-ico { color: var(--green); font-weight: 800; font-size: 18px; flex-shrink: 0; }
  .pl-note { font-size: 12px; color: var(--dim); line-height: 1.5; margin: 4px 0 0; }
  .pl-total { font-size: 12px; color: var(--wood); font-weight: 700; margin-top: 8px; text-align: right; }
</style>
</head>
<body>

<header>
  <svg width="34" height="34" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="18" fill="#FF6B35"/>
    <path d="M2 20h36 M20 2v36 M6 7c8 7 8 19 0 26 M34 7c-8 7-8 19 0 26" stroke="#1a1a1a" stroke-width="1.6" fill="none"/>
  </svg>
  <div>
    <div class="title">HOOPS TRAINER</div>
    <div class="subtitle" id="subtitle">Today's session</div>
  </div>
</header>

<div class="divider"><div class="l"></div><div class="c"></div><div class="l"></div></div>

<main id="main"></main>

<div id="toast"></div>

<input type="file" id="importFile" accept=".json,application/json" style="display:none" />

<nav>
  <button class="tab active" id="tabSession"><span class="icon">⏱</span>SESSION</button>
  <button class="tab" id="tabPlaylists"><span class="icon">📋</span>PLAYLISTS</button>
  <button class="fab" id="fab" aria-label="Add">+</button>
  <button class="tab" id="tabPlaybook"><span class="icon">⭐</span>PLAYBOOK</button>
  <button class="tab" id="tabNotes"><span class="icon">📝</span>NOTES</button>

<!-- Add drill sheet -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <h2>NEW DRILL</h2>
    <div class="field">
      <label>Drill name</label>
      <input type="text" id="inName" placeholder="e.g. Mikan Drill" />
    </div>
    <div class="field">
      <label>Timer</label>
      <div class="steppers">
        <div class="stepper">
          <button id="minDown">−</button>
          <div><div class="val" id="minVal">5</div><div class="lbl">MIN</div></div>
          <button id="minUp">+</button>
        </div>
        <div class="stepper">
          <button id="secDown">−</button>
          <div><div class="val" id="secVal">0</div><div class="lbl">SEC</div></div>
          <button id="secUp">+</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Tutorial link (optional)</label>
      <input type="url" id="inUrl" placeholder="YouTube or Instagram link…" autocapitalize="none" autocomplete="off" />
      <div class="hint">YouTube links play right on the timer screen. Instagram links open the Instagram app.</div>
    </div>
    <label class="checkrow">
      <input type="checkbox" id="inFav" checked /> Save to Playbook ⭐
    </label>
    <div class="actions">
      <button class="btn cancel" id="addCancel">Cancel</button>
      <button class="btn primary ok" id="addOk">Add drill</button>
    </div>
  </div>
</div>

<!-- Playlist builder sheet -->
<div class="overlay" id="plOverlay">
  <div class="sheet">
    <h2 id="plTitle">NEW PLAYLIST</h2>
    <div class="field">
      <label>Playlist name</label>
      <input type="text" id="plName" placeholder="e.g. Morning Shootaround" />
    </div>
    <div class="field">
      <label>Drills in this playlist (runs top to bottom)</label>
      <div class="pl-list" id="plSelected"></div>
      <div class="pl-total" id="plTotal"></div>
    </div>
    <div class="field">
      <label>Tap a Playbook drill to add it</label>
      <div class="pl-list" id="plSource"></div>
      <div class="pl-note" id="plSourceNote"></div>
    </div>
    <div class="actions">
      <button class="btn cancel" id="plCancel">Cancel</button>
      <button class="btn primary ok" id="plSave">Save playlist</button>

</div>

<!-- Note editor sheet -->
<div class="overlay" id="noteOverlay">
  <div class="sheet">
    <h2 id="noteTitleHdr">NEW NOTE</h2>
    <div class="field">
      <label>Title</label>
      <input type="text" id="noteTitle" placeholder="e.g. Free throw form cues" />

    <div class="field grow">

<!-- Timer screen -->
<div id="timerScreen">
  <div class="timer-top">
    <button class="btn" id="timerBack">‹ Back</button>
    <a class="playlink" id="timerTut" target="_blank" rel="noopener noreferrer" style="display:none" title="Open tutorial">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </a>
  </div>
  <div class="timer-name" id="timerName"></div>
  <div class="timer-state" id="timerState">Clock stopped</div>
  <div id="runnerInfo"></div>

  <!-- YouTube tutorial plays here -->
  <div id="videoWrap"></div>

  <!-- Instagram tutorial opens the app -->
  <a id="instaBtn" target="_blank" rel="noopener noreferrer">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
    </svg>
    Open tutorial in Instagram
  </a>

  <div class="ring-wrap">
    <svg id="ringSvg" width="260" height="260" viewBox="0 0 280 280">
      <circle cx="140" cy="140" r="120" stroke="rgba(255,255,255,0.10)" stroke-width="14" fill="none"/>
      <circle id="ring" cx="140" cy="140" r="120" fill="none" stroke="#FF6B35" stroke-width="14"
        stroke-linecap="round" transform="rotate(-90 140 140)"
        style="transition: stroke-dashoffset .3s linear"/>
    </svg>
    <div class="ring-center">
      <div id="ballEmoji">🏀</div>
      <div id="clock">0:00</div>
      <div id="buzzerLabel">BUZZER!</div>
    </div>

  <div class="controls">
    <button class="ctl arrow" id="prevBtn" style="display:none" title="Last drill">←</button>
    <button class="ctl" id="resetBtn">↺</button>
    <button id="playPause">▶</button>

    <button class="ctl spacer" id="ctlSpacer">↺</button>

</div>

<script>
(function () {
  "use strict";

  // ---------- State & persistence ----------
  const KEY = "hoops-trainer-data";
  let session = [], favorites = [], playlists = [], notes = [], tab = "session";

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) {
        const d = JSON.parse(raw);
        session = d.session || [];
        favorites = d.favorites || [];
        playlists = d.playlists || [];
        notes = d.notes || [];
      }
    } catch (e) {}
  }
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify({ session, favorites, playlists, notes })); } catch (e) {}
  }

  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const fmt = (s) => Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
  const esc = (s) => s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const normalizeUrl = (u) => {
    const t = (u || "").trim();
    if (!t) return "";
    return /^https?:\/\//i.test(t) ? t : "https://" + t;
  };
  const safeHref = (u) => {
    try {
      const url = new URL(u);
      return (url.protocol === "https:" || url.protocol === "http:") ? url.href : "";
    } catch (e) { return ""; }
  };

  // ---------- Link classification ----------
  // Returns "" or the video id, for YouTube links of any common shape
  function youtubeId(u) {
    try {
      const url = new URL(u);
      const host = url.hostname.replace(/^www\.|^m\./, "");
      if (host === "youtu.be") {
        const id = url.pathname.split("/")[1];
        return /^[\w-]{6,}$/.test(id || "") ? id : "";
      }
      if (host === "youtube.com" || host === "music.youtube.com") {
        if (url.pathname === "/watch") {
          const id = url.searchParams.get("v");
          return /^[\w-]{6,}$/.test(id || "") ? id : "";
        }
        const m = url.pathname.match(/^\/(shorts|embed|live)\/([\w-]{6,})/);
        if (m) return m[2];
      }
      return "";
    } catch (e) { return ""; }
  }
  function isInstagram(u) {
    try {
      const host = new URL(u).hostname.replace(/^www\./, "");
      return host === "instagram.com" || host.endsWith(".instagram.com");
    } catch (e) { return false; }
  }
  // Parses the timestamp from a YouTube URL: ?t=90, ?t=90s, ?t=1m30s,
  // ?t=1h2m3s, or ?start=90 all become seconds. Returns 0 if none.
  function youtubeStart(u) {
    try {
      const url = new URL(u);
      const t = url.searchParams.get("t") || url.searchParams.get("start");
      if (!t) return 0;
      if (/^\d+$/.test(t)) return parseInt(t, 10);
      const m = t.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s?)?$/i);
      if (!m) return 0;
      return (parseInt(m[1] || 0, 10) * 3600) + (parseInt(m[2] || 0, 10) * 60) + parseInt(m[3] || 0, 10);
    } catch (e) { return 0; }
  }
  function linkKind(u) {
    if (!u) return "none";
    if (youtubeId(u)) return "youtube";
    if (isInstagram(u)) return "instagram";
    return "other";
  }

  // ---------- Toast ----------
  const toastEl = document.getElementById("toast");
  let toastTimer = null;
  function flash(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1800);
  }

  // ---------- Rendering ----------
  const main = document.getElementById("main");
  const subtitle = document.getElementById("subtitle");

  function playLinkHTML(url) {
    const href = safeHref(url);
    if (!href) return "";
    const kind = linkKind(href);
    if (kind === "instagram") {
      return '<a class="playlink insta" href="' + esc(href) + '" target="_blank" rel="noopener noreferrer" title="Open in Instagram">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
        '<rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg></a>';
    }
    return '<a class="playlink" href="' + esc(href) + '" target="_blank" rel="noopener noreferrer" title="Open tutorial">' +
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></a>';
  }

  function metaHTML(w) {
    const kind = linkKind(w.tutorialURL);
    let tut = "";
    if (kind === "youtube") tut = '<span class="yt">▶ YouTube tutorial</span>';
    else if (kind === "instagram") tut = '<span class="ig">◉ Instagram tutorial</span>';
    else if (kind === "other") tut = '<span class="yt">▶ tutorial linked</span>';
    return '<div class="meta"><span>⏱ ' + fmt(w.durationSeconds) + '</span>' + tut + '</div>';
  }

  function emptyHTML(title, msg) {
    return '<div class="empty"><div class="ball">🏀</div><div class="t">' + title + '</div><div class="m">' + msg + '</div></div>';
  }

  function render() {
    document.getElementById("tabSession").classList.toggle("active", tab === "session");
    document.getElementById("tabPlaylists").classList.toggle("active", tab === "playlists");
    document.getElementById("tabPlaybook").classList.toggle("active", tab === "playbook");
    document.getElementById("tabNotes").classList.toggle("active", tab === "notes");
    subtitle.textContent =
      tab === "session" ? "Today's session" :
      tab === "playlists" ? "Drill playlists" :
      tab === "notes" ? "Training notes" : "Saved playbook";

    if (tab === "notes") {
      if (!notes.length) {
        main.innerHTML = emptyHTML("No notes yet", "Tap the orange + to jot down coaching cues, goals, or anything worth remembering.");
        return;
      }
      main.innerHTML = notes.map((n) => {
        const date = n.updatedAt ? new Date(n.updatedAt).toLocaleDateString(undefined, { month: "short", day: "numeric" }) : "";
        return '<div class="card">' +
          '<div class="info"><div class="name">📝 ' + esc(n.title) + '</div>' +
          '<div class="meta"><span>' + date + '</span></div>' +
          (n.body ? '<div class="note-snippet">' + esc(n.body) + '</div>' : '') +
          '</div>' +
          '<button class="btn" data-act="editnote" data-id="' + n.id + '" title="Open">✎</button>' +
          '<button class="btn dim" data-act="delnote" data-id="' + n.id + '" title="Delete">✕</button>' +
        '</div>';
      }).join("");
      return;
    }

    if (tab === "playlists") {
      if (!playlists.length) {
        main.innerHTML = emptyHTML("No playlists yet", "Tap the orange + to build one from your Playbook drills. Running a playlist plays each drill's timer back to back.");
        return;
      }
      main.innerHTML = playlists.map((p) => {
        const total = p.drills.reduce((s, d) => s + d.durationSeconds, 0);
        return '<div class="card">' +
          '<div class="info"><div class="name">📋 ' + esc(p.name) + '</div>' +
          '<div class="meta"><span>' + p.drills.length + ' drill' + (p.drills.length === 1 ? '' : 's') + '</span><span>⏱ ' + fmt(total) + ' total</span></div></div>' +
          '<button class="btn primary" data-act="runpl" data-id="' + p.id + '">▶ Run</button>' +
          '<button class="btn" data-act="editpl" data-id="' + p.id + '" title="Edit">✎</button>' +
          '<button class="btn dim" data-act="delpl" data-id="' + p.id + '" title="Delete">✕</button>' +
        '</div>';
      }).join("");
      return;
    }

    if (tab === "session") {
      if (!session.length) {
        main.innerHTML = emptyHTML("No drills on the court", "Tap the orange + to add a drill, or pull one from your Playbook.");
        return;
      }
      main.innerHTML = session.map((w) =>
        '<div class="card">' +
          '<div class="info"><div class="name">' + esc(w.name) + '</div>' + metaHTML(w) + '</div>' +
          playLinkHTML(w.tutorialURL) +
          '<button class="btn primary" data-act="start" data-id="' + w.id + '">Start</button>' +
          '<button class="btn" data-act="star" data-id="' + w.id + '" title="Save to Playbook">⭐</button>' +
          '<button class="btn dim" data-act="del" data-id="' + w.id + '" title="Remove">✕</button>' +
        '</div>'
      ).join("");
    } else {
      const backupHTML =
        '<div class="backup">' +
          '<button class="btn" data-act="export">⬇ Export backup</button>' +
          '<button class="btn" data-act="import">⬆ Import backup</button>' +
        '</div>' +
        '<details class="help">' +
          '<summary>🛡 Protect your playbook — how backups work</summary>' +
          '<div class="help-body">' +
            'Your drills are stored on <b>this device only</b>. They can be lost if you ' +
            '<span class="warn">delete this app\u2019s home-screen icon</span>, ' +
            '<span class="warn">clear Safari\u2019s website data</span>, or switch to a new phone.' +
            '<br/><br/><b>To back up:</b>' +
            '<ol>' +
              '<li>Tap <b>Export backup</b> above.</li>' +
              '<li>In the share sheet, choose <b>Save to Files</b> and pick <b>iCloud Drive</b>.</li>' +
              '<li>Re-export whenever you add drills you\u2019d hate to lose.</li>' +
            '</ol>' +
            '<b>To restore</b> (same phone or a new one): open this app, tap <b>Import backup</b>, and pick your backup file. ' +
            'Importing merges with what\u2019s already here — it never deletes drills, and skips duplicates.' +
            '<br/><br/><b>Tips:</b> use the home-screen version of this app rather than a Safari tab (Safari can clear a website\u2019s data after 7 days of no visits, but installed apps are exempt), and keep at least one backup file in iCloud Drive so a lost phone doesn\u2019t mean a lost playbook.' +
          '</div>' +
        '</details>';
      if (!favorites.length) {
        main.innerHTML = emptyHTML("Playbook is empty", "Save a drill with the ⭐ button, or check “Save to Playbook” when creating one.") + backupHTML;
        return;
      }
      main.innerHTML = favorites.map((f) =>
        '<div class="card">' +
          '<div class="info"><div class="name">' + esc(f.name) + '</div>' + metaHTML(f) + '</div>' +
          playLinkHTML(f.tutorialURL) +
          '<button class="btn green" data-act="addfav" data-id="' + f.id + '">+ Add</button>' +
          '<button class="btn dim" data-act="delfav" data-id="' + f.id + '" title="Remove">✕</button>' +
        '</div>'
      ).join("") + backupHTML;
    }
  }

  main.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-act]");
    if (!btn) return;
    const id = btn.dataset.id, act = btn.dataset.act;
    if (act === "start") {
      const w = session.find((x) => x.id === id);
      if (w) openTimer(w);
    } else if (act === "del") {
      session = session.filter((x) => x.id !== id); save(); render();
    } else if (act === "star") {
      const w = session.find((x) => x.id === id);
      if (!w) return;
      if (favorites.some((f) => f.name === w.name && f.durationSeconds === w.durationSeconds)) {
        flash("Already in your Playbook");
      } else {
        favorites.push(Object.assign({}, w, { id: uid() })); save(); flash("Saved to Playbook ⭐");
      }
    } else if (act === "addfav") {
      const f = favorites.find((x) => x.id === id);
      if (!f) return;
      session.push(Object.assign({}, f, { id: uid() })); save();
      flash("Added to today's session");
      tab = "session"; render();
    } else if (act === "delfav") {
      favorites = favorites.filter((x) => x.id !== id); save(); render();
    } else if (act === "export") {
      exportBackup();
    } else if (act === "import") {
      document.getElementById("importFile").click();
    } else if (act === "runpl") {
      const p = playlists.find((x) => x.id === id);
      if (p && p.drills.length) openPlaylist(p);
    } else if (act === "editpl") {
      const p = playlists.find((x) => x.id === id);
      if (p) openPlaylistBuilder(p);
    } else if (act === "delpl") {
      playlists = playlists.filter((x) => x.id !== id); save(); render();
    } else if (act === "editnote") {
      const n = notes.find((x) => x.id === id);
      if (n) openNoteEditor(n);
    } else if (act === "delnote") {
      notes = notes.filter((x) => x.id !== id); save(); render();
    }
  });

  document.getElementById("tabPlaylists").onclick = () => { tab = "playlists"; render(); };
  document.getElementById("tabNotes").onclick = () => { tab = "notes"; render(); };

  // ---------- Backup: export / import ----------
  function exportBackup() {
    try {
      const stamp = new Date().toISOString().slice(0, 10);
      const payload = JSON.stringify({ app: "hoops-trainer", exportedAt: new Date().toISOString(), session, favorites, playlists, notes }, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "hoops-backup-" + stamp + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
      flash("Backup exported — save it to Files/iCloud");
    } catch (e) {
      flash("Export failed");
    }
  }

  document.getElementById("importFile").addEventListener("change", function () {
    const file = this.files && this.files[0];
    this.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function () {
      try {
        const d = JSON.parse(reader.result);
        if (!d || (!Array.isArray(d.favorites) && !Array.isArray(d.session))) throw new Error("bad file");
        let added = 0;
        (d.favorites || []).forEach(function (f) {
          if (f && f.name && typeof f.durationSeconds === "number" &&
              !favorites.some((x) => x.name === f.name && x.durationSeconds === f.durationSeconds)) {
            favorites.push({ id: uid(), name: String(f.name), durationSeconds: f.durationSeconds, tutorialURL: String(f.tutorialURL || "") });
            added++;
          }
        });
        let plAdded = 0;
        (d.playlists || []).forEach(function (p) {
          if (p && p.name && Array.isArray(p.drills) &&
              !playlists.some((x) => x.name === p.name)) {
            playlists.push({
              id: uid(),
              name: String(p.name),
              drills: p.drills
                .filter((dr) => dr && dr.name && typeof dr.durationSeconds === "number")
                .map((dr) => ({ name: String(dr.name), durationSeconds: dr.durationSeconds, tutorialURL: String(dr.tutorialURL || "") })),
            });
            plAdded++;
          }
        });
        let ntAdded = 0;
        (d.notes || []).forEach(function (n) {
          if (n && n.title &&
              !notes.some((x) => x.title === n.title && x.body === (n.body || ""))) {
            notes.push({ id: uid(), title: String(n.title), body: String(n.body || ""), updatedAt: n.updatedAt || new Date().toISOString() });
            ntAdded++;
          }
        });
        save(); render();
        const parts = [];
        if (added) parts.push(added + " drill" + (added === 1 ? "" : "s"));
        if (plAdded) parts.push(plAdded + " playlist" + (plAdded === 1 ? "" : "s"));
        if (ntAdded) parts.push(ntAdded + " note" + (ntAdded === 1 ? "" : "s"));
        flash(parts.length ? "Restored " + parts.join(" + ") + " ⭐" : "Nothing new to restore");
      } catch (e) {
        flash("Couldn't read that backup file");
      }
    };
    reader.readAsText(file);
  });

  document.getElementById("tabSession").onclick = () => { tab = "session"; render(); };
  document.getElementById("tabPlaybook").onclick = () => { tab = "playbook"; render(); };

  // ---------- Add drill sheet ----------
  const addOverlay = document.getElementById("addOverlay");
  const inName = document.getElementById("inName");
  const inUrl = document.getElementById("inUrl");
  const inFav = document.getElementById("inFav");
  const minVal = document.getElementById("minVal");
  const secVal = document.getElementById("secVal");
  const addOk = document.getElementById("addOk");
  let mins = 5, secs = 0;

  function syncSheet() {
    minVal.textContent = mins;
    secVal.textContent = secs;
    addOk.disabled = !(inName.value.trim() && (mins * 60 + secs) > 0);
  }
  document.getElementById("minUp").onclick = () => { mins = Math.min(60, mins + 1); syncSheet(); };
  document.getElementById("minDown").onclick = () => { mins = Math.max(0, mins - 1); syncSheet(); };
  document.getElementById("secUp").onclick = () => { secs = Math.min(59, secs + 5); syncSheet(); };
  document.getElementById("secDown").onclick = () => { secs = Math.max(0, secs - 5); syncSheet(); };
  inName.addEventListener("input", syncSheet);

  document.getElementById("fab").onclick = () => {
    if (tab === "playlists") { openPlaylistBuilder(null); return; }
    if (tab === "notes") { openNoteEditor(null); return; }
    inName.value = ""; inUrl.value = ""; inFav.checked = true; mins = 5; secs = 0;
    syncSheet();
    addOverlay.classList.add("open");
    setTimeout(() => inName.focus(), 100);
  };
  document.getElementById("addCancel").onclick = () => addOverlay.classList.remove("open");
  addOverlay.addEventListener("click", (e) => { if (e.target === addOverlay) addOverlay.classList.remove("open"); });

  // ---------- Note editor ----------
  const noteOverlay = document.getElementById("noteOverlay");
  const noteTitle = document.getElementById("noteTitle");
  const noteBody = document.getElementById("noteBody");
  const noteSaveBtn = document.getElementById("noteSave");
  let editingNoteId = null;

  function openNoteEditor(n) {
    editingNoteId = n ? n.id : null;
    noteTitle.value = n ? n.title : "";
    noteBody.value = n ? n.body : "";
    document.getElementById("noteTitleHdr").textContent = n ? "EDIT NOTE" : "NEW NOTE";
    noteSaveBtn.disabled = !noteTitle.value.trim();
    noteOverlay.classList.add("open");
    if (!n) setTimeout(() => noteTitle.focus(), 100);
  }

  noteTitle.addEventListener("input", () => {
    noteSaveBtn.disabled = !noteTitle.value.trim();
  });

  document.getElementById("noteCancel").onclick = () => noteOverlay.classList.remove("open");
  noteOverlay.addEventListener("click", (e) => { if (e.target === noteOverlay) noteOverlay.classList.remove("open"); });

  noteSaveBtn.onclick = () => {
    const title = noteTitle.value.trim();
    if (!title) return;
    const body = noteBody.value;
    if (editingNoteId) {
      const n = notes.find((x) => x.id === editingNoteId);
      if (n) { n.title = title; n.body = body; n.updatedAt = new Date().toISOString(); }
    } else {
      notes.unshift({ id: uid(), title: title, body: body, updatedAt: new Date().toISOString() });
    }
    save();
    noteOverlay.classList.remove("open");
    tab = "notes"; render();
    flash("Note saved 📝");
  };

  // ---------- Playlist builder ----------
  const plOverlay = document.getElementById("plOverlay");
  const plName = document.getElementById("plName");
  const plSelected = document.getElementById("plSelected");
  const plSource = document.getElementById("plSource");
  const plSourceNote = document.getElementById("plSourceNote");
  const plTotal = document.getElementById("plTotal");
  const plSaveBtn = document.getElementById("plSave");
  let plDrills = [];        // ordered drill copies being built
  let editingPlId = null;   // playlist id when editing, null when creating

  function openPlaylistBuilder(p) {
    editingPlId = p ? p.id : null;
    plName.value = p ? p.name : "";
    plDrills = p ? p.drills.map((d) => Object.assign({}, d)) : [];
    document.getElementById("plTitle").textContent = p ? "EDIT PLAYLIST" : "NEW PLAYLIST";
    renderPlBuilder();
    plOverlay.classList.add("open");
    if (!p) setTimeout(() => plName.focus(), 100);
  }

  function renderPlBuilder() {
    // Selected (ordered) drills
    if (!plDrills.length) {
      plSelected.innerHTML = '<div class="pl-note">No drills yet — tap drills below to add them. The same drill can be added more than once (for multiple sets).</div>';
    } else {
      plSelected.innerHTML = plDrills.map((d, i) =>
        '<div class="pl-row">' +
          '<span class="num">' + (i + 1) + '</span>' +
          '<span class="nm">' + esc(d.name) + '</span>' +
          '<span class="dur">' + fmt(d.durationSeconds) + '</span>' +
          '<button data-plact="up" data-i="' + i + '" title="Move up"' + (i === 0 ? ' disabled style="opacity:.3"' : '') + '>↑</button>' +
          '<button data-plact="rm" data-i="' + i + '" title="Remove">✕</button>' +
        '</div>'
      ).join("");
    }
    const total = plDrills.reduce((s, d) => s + d.durationSeconds, 0);
    plTotal.textContent = plDrills.length ? "Total: " + fmt(total) : "";

    // Source drills from the Playbook
    if (!favorites.length) {
      plSource.innerHTML = "";
      plSourceNote.textContent = "Your Playbook is empty — save some drills there first, then come back to build a playlist.";
    } else {
      plSourceNote.textContent = "";
      plSource.innerHTML = favorites.map((f) =>
        '<div class="pl-row pick" data-plact="pick" data-id="' + f.id + '">' +
          '<span class="add-ico">＋</span>' +
          '<span class="nm">' + esc(f.name) + '</span>' +
          '<span class="dur">' + fmt(f.durationSeconds) + '</span>' +
        '</div>'
      ).join("");
    }
    plSaveBtn.disabled = !(plName.value.trim() && plDrills.length);
  }

  plName.addEventListener("input", () => {
    plSaveBtn.disabled = !(plName.value.trim() && plDrills.length);
  });

  plOverlay.addEventListener("click", (e) => {
    if (e.target === plOverlay) { plOverlay.classList.remove("open"); return; }
    const el = e.target.closest("[data-plact]");
    if (!el) return;
    const act = el.dataset.plact;
    if (act === "pick") {
      const f = favorites.find((x) => x.id === el.dataset.id);
      if (f) plDrills.push({ name: f.name, durationSeconds: f.durationSeconds, tutorialURL: f.tutorialURL || "" });
    } else if (act === "rm") {
      plDrills.splice(parseInt(el.dataset.i, 10), 1);
    } else if (act === "up") {
      const i = parseInt(el.dataset.i, 10);
      if (i > 0) { const t = plDrills[i - 1]; plDrills[i - 1] = plDrills[i]; plDrills[i] = t; }
    }
    renderPlBuilder();
  });

  document.getElementById("plCancel").onclick = () => plOverlay.classList.remove("open");

  plSaveBtn.onclick = () => {
    const name = plName.value.trim();
    if (!name || !plDrills.length) return;
    if (editingPlId) {
      const p = playlists.find((x) => x.id === editingPlId);
      if (p) { p.name = name; p.drills = plDrills; }
    } else {
      playlists.push({ id: uid(), name: name, drills: plDrills });
    }
    save();
    plOverlay.classList.remove("open");
    tab = "playlists"; render();
    flash("Playlist saved 📋");
  };

  addOk.onclick = () => {
    const w = {
      id: uid(),
      name: inName.value.trim(),
      durationSeconds: mins * 60 + secs,
      tutorialURL: normalizeUrl(inUrl.value),
    };
    session.push(w);
    if (inFav.checked && !favorites.some((f) => f.name === w.name && f.durationSeconds === w.durationSeconds)) {
      favorites.push(Object.assign({}, w, { id: uid() }));
    }
    save();
    addOverlay.classList.remove("open");
    tab = "session"; render();
  };

  // ---------- Audio (iOS-friendly buzzer) ----------
  // iOS only allows sound that was unlocked inside a user gesture, so we prime
  // the AudioContext when Start is tapped. Setting the audio session type to
  // "playback" (Safari 17+) lets the buzzer sound even if the phone's
  // ringer/silent switch is on.
  let audioCtx = null;

  function unlockAudio() {
    try {
      if (navigator.audioSession) {
        try { navigator.audioSession.type = "playback"; } catch (e) {}
      }
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      // Play one silent sample to fully unlock output on iOS
      const buf = audioCtx.createBuffer(1, 1, 22050);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
    } catch (e) {}
  }

  function buzzer() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      const now = audioCtx.currentTime;
      // Three arena-style blasts: BZZT  BZZT  BZZZZZT
      const blasts = [[0, 0.45], [0.65, 0.45], [1.3, 0.9]];
      blasts.forEach(function (b) {
        const start = b[0], dur = b[1];
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "square";
        osc.frequency.value = 190;
        gain.gain.setValueAtTime(0.0001, now + start);
        gain.gain.exponentialRampToValueAtTime(0.6, now + start + 0.02);
        gain.gain.setValueAtTime(0.6, now + start + dur - 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + start + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + start);
        osc.stop(now + start + dur + 0.05);
      });
    } catch (e) {}
    if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 600]);
  }

  // ---------- Timer ----------
  const screen = document.getElementById("timerScreen");
  const ring = document.getElementById("ring");
  const ringSvg = document.getElementById("ringSvg");
  const clock = document.getElementById("clock");
  const playPause = document.getElementById("playPause");
  const buzzerLabel = document.getElementById("buzzerLabel");
  const timerState = document.getElementById("timerState");
  const videoWrap = document.getElementById("videoWrap");
  const instaBtn = document.getElementById("instaBtn");
  const C = 2 * Math.PI * 120;
  ring.setAttribute("stroke-dasharray", C);

  let current = null, remaining = 0, running = false, interval = null, endAt = 0, wakeLock = null;
  let playlist = null, plIndex = 0, advanceTimer = null;   // playlist runner state
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const runnerInfo = document.getElementById("runnerInfo");
  const backBtn = document.getElementById("timerBack");

  async function requestWakeLock() {
    try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
  }
  function releaseWakeLock() {
    try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
  }

  function drawTimer() {
    clock.textContent = fmt(remaining);
    const done = remaining === 0;
    const progress = current.durationSeconds > 0 ? 1 - remaining / current.durationSeconds : 0;
    ring.setAttribute("stroke-dashoffset", C * (1 - progress));
    ring.setAttribute("stroke", done ? "#3ED66E" : "#FF6B35");
    clock.classList.toggle("done", done);
    clock.classList.toggle("running", running && !done);
    buzzerLabel.style.display = done ? "block" : "none";
    if (playlist) {
      const last = plIndex >= playlist.drills.length - 1;
      runnerInfo.textContent = "Drill " + (plIndex + 1) + " of " + playlist.drills.length + " · " + playlist.name;
      if (done && last) {
        timerState.textContent = "Playlist complete 🏆";
        buzzerLabel.textContent = "FINAL BUZZER!";
      } else if (done) {
        timerState.textContent = "Next drill starting…";
        buzzerLabel.textContent = "BUZZER!";
      } else {
        timerState.textContent = running ? "Clock running" : "Clock stopped";
        buzzerLabel.textContent = "BUZZER!";
      }
      prevBtn.disabled = plIndex === 0;
      nextBtn.disabled = last;
    } else {
      timerState.textContent = done ? "Final buzzer" : running ? "Clock running" : "Clock stopped";
      buzzerLabel.textContent = "BUZZER!";
    }
    playPause.textContent = running ? "❚❚" : "▶";
    playPause.disabled = done;
  }

  function stopClock() {
    running = false;
    if (interval) { clearInterval(interval); interval = null; }
    releaseWakeLock();
  }

  function startClock() {
    if (remaining <= 0) return;
    unlockAudio();               // must happen inside this tap for iOS
    running = true;
    endAt = Date.now() + remaining * 1000;
    requestWakeLock();
    interval = setInterval(() => {
      remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
      if (remaining <= 0) {
        stopClock();
        buzzer();
        // In a playlist, auto-advance to the next drill after the buzzer
        if (playlist && plIndex < playlist.drills.length - 1) {
          clearTimeout(advanceTimer);
          advanceTimer = setTimeout(() => {
            if (!playlist || !screen.classList.contains("open")) return;
            plIndex++;
            loadDrill(playlist.drills[plIndex], true);
          }, 2400);
        }
      }
      drawTimer();
    }, 250);
    drawTimer();
  }

  // Sets up the timer screen for one drill (media, clock, ring size)
  function loadDrill(w, autoStart) {
    clearTimeout(advanceTimer);
    stopClock();
    current = w;
    remaining = w.durationSeconds;
    running = false;

    document.getElementById("timerName").textContent = w.name;

    const href = safeHref(w.tutorialURL);
    const kind = linkKind(href);
    const tut = document.getElementById("timerTut");

    // Reset media areas
    videoWrap.innerHTML = "";
    videoWrap.style.display = "none";
    instaBtn.style.display = "none";
    tut.style.display = "none";
    screen.classList.remove("compact");

    if (kind === "youtube") {
      const id = youtubeId(href);
      const startAt = youtubeStart(href);
      const iframe = document.createElement("iframe");
      iframe.src = "https://www.youtube.com/embed/" + id + "?playsinline=1&rel=0" +
        (startAt > 0 ? "&start=" + startAt : "");
      iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
      iframe.setAttribute("allowfullscreen", "");
      videoWrap.appendChild(iframe);
      videoWrap.style.display = "block";
      // Shrink the ring so video + timer + controls fit on one screen
      ringSvg.setAttribute("width", "190");
      ringSvg.setAttribute("height", "190");
      screen.classList.add("compact");
    } else {
      ringSvg.setAttribute("width", "260");
      ringSvg.setAttribute("height", "260");
      if (kind === "instagram") {
        instaBtn.href = href;
        instaBtn.style.display = "flex";
      } else if (kind === "other") {
        tut.href = href;
        tut.style.display = "flex";
      }
    }

    drawTimer();
    if (autoStart) startClock();
  }

  // Single-drill mode
  function openTimer(w) {
    playlist = null;
    runnerInfo.style.display = "none";
    prevBtn.style.display = "none";
    nextBtn.style.display = "none";
    document.getElementById("ctlSpacer").style.display = "";
    backBtn.textContent = "‹ Back";
    loadDrill(w, false);
    screen.classList.add("open");
  }

  // Playlist mode: runs each drill's timer in succession
  function openPlaylist(p) {
    playlist = p;
    plIndex = 0;
    runnerInfo.style.display = "block";
    prevBtn.style.display = "";
    nextBtn.style.display = "";
    document.getElementById("ctlSpacer").style.display = "none";
    backBtn.textContent = "⌂ Home";
    loadDrill(p.drills[0], false);
    screen.classList.add("open");
  }

  function closeTimer() {
    clearTimeout(advanceTimer);
    stopClock();
    playlist = null;
    videoWrap.innerHTML = "";   // removes the iframe, which stops YouTube playback
    screen.classList.remove("open");
  }

  prevBtn.onclick = () => {
    if (!playlist || plIndex === 0) return;
    plIndex--;
    loadDrill(playlist.drills[plIndex], true);
  };
  nextBtn.onclick = () => {
    if (!playlist || plIndex >= playlist.drills.length - 1) return;
    plIndex++;
    loadDrill(playlist.drills[plIndex], true);
  };

  playPause.onclick = () => { running ? (stopClock(), drawTimer()) : startClock(); };
  document.getElementById("resetBtn").onclick = () => { stopClock(); remaining = current.durationSeconds; drawTimer(); };
  document.getElementById("timerBack").onclick = closeTimer;

  // Re-acquire wake lock and resync the clock if user switches back mid-drill
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && running) {
      requestWakeLock();
      remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
      if (remaining <= 0) { stopClock(); buzzer(); }
      drawTimer();
    }
  });

  // ---------- Init ----------
  // Ask the browser to mark this site's storage as persistent (not evictable
  // under storage pressure). Harmless no-op where unsupported.
  try {
    if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
  } catch (e) {}

  load();
  render();
})();
</script>
</body>
</html>
